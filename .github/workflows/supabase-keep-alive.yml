name: Supabase Keep Alive

on:
  schedule:
    # Chaque jour à 08h00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

jobs:
  ping:
    name: Ping Supabase DB
    runs-on: ubuntu-latest
    steps:
      - name: Ping base de données Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Secret DATABASE_URL non configuré."
            exit 1
          fi

          psql "$DATABASE_URL" -c "SELECT 1;" --no-password
          echo "Base de données active."
